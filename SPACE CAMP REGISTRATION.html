<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Camp Registration</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #EEF5FF;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .container{
            background: #8fafe8;
            width: 850px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0,0,0,.5);
        }

        .hero{
            background: #4F8EF7;
            text-align: center;
            padding: 35px;
        }

        .hero h1{
            font-size: 40px;
            letter-spacing: 2px;
        }

        .hero p{
            margin-top: 10px;
        }

        .box p{
            color: #062253;
        }

        input,textarea{
            background: #e8e1da;
            border: 1px solid #1f08a0;
        }

        button{
            background: #1568f6;
        }

        .image{
            text-align: center;
        }

        .image img{
            width: 100%;
            height: 300px;
            box-shadow: 0px 5px 20px rgba(0,0,0,.4);
        }

        .form-area{
            padding: 35px;
        }

        .form-area h2{
            text-align: center;
            margin-bottom: 30px;
        }

        .row{
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .box{
            flex: 1;
        }

        .box p{
            margin-bottom: 8px;
            font-weight: bold;
        }

        input,
        textarea{
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea{
            resize: none;
        }

        meter,
        progress{
            width: 100%;
            height: 20px;
            margin-top: 8px;
        }

        button{
            width: 100%;
            padding: 14px;
            margin-top: 30px;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🚀 SPACE CAMP</h1>
            <p>Reach Beyond the Stars • Train Like an Astronaut</p>
        </div>
        <div class="image">
            <img src="./public/src/mouni.jpeg" alt="Astronaut">
        </div>
        <div class="form-area">
            <h2>Explorer Registration Form</h2>
            <form action="./register.jsp" method="post" novalidate>
                <div class="row">
                    <div class="box">
                        <p>Explorer Name</p>
                        <input type="text" name="name" placeholder="Enter Explorer Name" pattern="^[A-z][a-z]{3,14}$" required autofocus>
                    </div>
                    <div class="box">
                        <p>Password</p>
                        <input type="text" name="password" placeholder="Create Password" pattern="(?=.*[A-Z])(?=.*[0-9])(?=.*[\W])[\w\W]{8,15}" readonly>
                    </div>
                </div>
                <div class="row">
                    <div class="box">
                        <p>Age</p>
                        <input type="number" min="18" max="35" value="18">
                    </div>
                    <div class="box">
                        <p>Fitness Score</p>
                        <input type="range" min="0" max="100" value="70">
                    </div>
                </div>
                <div class="row">
                    <div class="box">
                        <p>Camp Date</p>
                        <input type="date">
                    </div>
                    <div class="box">
                        <p>Reporting Time</p>
                        <input type="time">
                    </div>
                </div>
                <div class="row">
                    <div class="box">
                        <p>Mission Briefing</p>
                        <input type="datetime-local">
                    </div>
                </div>
                <div class="row">
                    <div class="box">
                        <p>Preferred Suit Color</p>
                        <input type="color" name="color" value="#2563EB">
                    </div>
                    <div class="box">
                        <P>Upload ID Card</P>
                        <input type="file" name="idcard" accept=".jpg,.png,.pdf">
                    </div>
                </div>
                <div class="row">
                    <div class="box">
                        <p>Why do you want to become an Astronaut?</p>
                        <textarea name="reason" rows="5" placeholder="Write your answer here..."></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="box">
                        <p>Medical Fitness</p>
                        <meter min="0" max="100" value="82" low="40" high="80"></meter>
                    </div>
                </div>
                <div class="row">
                    <div class="box">
                        <p>Registration Progress</p>
                        <progress max="100" value="65"></progress>
                    </div>
                </div>
                <button>🚀 Registration Mission</button>
            </form>
        </div>

    </div>
</body>
</html>
